<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Autotanques Petrocheck</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:url('https://petrocheck.com.ec/wp-content/uploads/2021/11/calidad-home.jpg') no-repeat center/cover;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

.container{max-width:900px;margin:auto;padding:25px;}

.header{text-align:center;margin-bottom:20px;}
.header img{height:70px;}

.step{display:none;}
.active{display:block;}

.card{
  background:white;
  padding:25px;
  border-radius:12px;
}

.item{
  border:1px solid #ddd;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

.cantidad{
  display:flex;
  gap:5px;
  margin-top:10px;
}
.cantidad button{
  width:30px;height:30px;
  background:#f97316;color:white;border:none;border-radius:5px;
}

input{
  width:60px;
  text-align:center;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:12px;
  font-weight:bold;
}

.btn{background:#f97316;color:white;}
.back{background:#ccc;}

.resumen{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="https://petrocheck.com.ec/wp-content/uploads/2021/09/logo_oscuro.png">
</div>

<!-- PASO 1 -->
<div id="step1" class="step active">

<div class="card">

<h3>Servicio de inspección de autotanques</h3>

<p>
✔ Certificación de calibración líquida<br>
✔ Medición de espesores<br>
✔ Certificación NTE INEN 2266<br>
✔ Certificación NTE INEN 2251<br>
✔ Varilla de bronce graduada
</p>

<div id="lista"></div>

</div>

<div id="resumenPaso1" class="resumen"></div>

<button class="btn" onclick="validar()">Siguiente</button>

</div>

<!-- PASO 2 -->
<div id="step2" class="step">

<div class="card">
<h3>Datos del cliente</h3>
<input id="cliente" placeholder="Razón Social">
<input id="ruc" placeholder="RUC">
<input id="contacto" placeholder="Contacto">
<input id="telefono" placeholder="Teléfono">
</div>

<div id="resumenFinal" class="resumen"></div>

<button class="back" onclick="next(1)">Atrás</button>
<button class="btn" onclick="generarPDF()">📄 PDF</button>
<button class="btn" onclick="enviarWhatsApp()">📲 WhatsApp</button>

</div>

</div>

<script>

/* RANGOS */
const rangos = [
["0-2000 galones",250],
["2001-4000 galones",280],
["4001-6000 galones",330],
["6001-8000 galones",350],
["8001-10000 galones",380]
];

const lista=document.getElementById("lista");

/* GENERAR ITEMS */
rangos.forEach((r,i)=>{
lista.innerHTML+=`
<div class="item">
<b>${r[0]}</b> → $${r[1]}

<div class="cantidad">
<button onclick="cambiar(${i},-1)">-</button>
<input id="cant${i}" value="0">
<button onclick="cambiar(${i},1)">+</button>
</div>
</div>
`;
});

/* CAMBIAR CANTIDAD */
function cambiar(i,val){
let input=document.getElementById("cant"+i);
let v=parseInt(input.value)||0;
v+=val;
if(v<0)v=0;
input.value=v;
actualizar();
}

/* ACTUALIZAR RESUMEN */
function actualizar(){

let total=0;
let texto="";

rangos.forEach((r,i)=>{
let c=parseInt(document.getElementById("cant"+i).value)||0;
if(c>0){
let subtotal=c*r[1];
total+=subtotal;
texto+=`• ${r[0]} x${c} = $${subtotal}\n`;
}
});

if(texto==="") texto="No hay selección";

let resumen=`
RESUMEN:

${texto}

TOTAL: $${total}

NOTA IMPORTANTE:
El servicio se realizará en el patio de calibraciones de PETROCHECK, sector El Beaterio, Quito - Ecuador.
El cliente debe movilizar el autotanque.
`;

document.getElementById("resumenPaso1").innerText=resumen;
document.getElementById("resumenFinal").innerText=resumen;
}

/* VALIDAR */
function validar(){
let valido=false;
rangos.forEach((r,i)=>{
if(parseInt(document.getElementById("cant"+i).value)>0) valido=true;
});
if(!valido) return alert("Selecciona al menos un servicio");

next(2);
}

/* CAMBIO */
function next(n){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+n).classList.add("active");
}

/* PDF */
function generarPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text(document.getElementById("resumenFinal").innerText,10,10);
doc.save("cotizacion.pdf");
}

/* WHATSAPP */
function enviarWhatsApp(){
let txt=document.getElementById("resumenFinal").innerText;
window.open("https://wa.me/593999300398?text="+encodeURIComponent(txt));
}

</script>

</body>
</html>
