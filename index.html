<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Autotanques Petrocheck</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:url('https://petrocheck.com.ec/wp-content/uploads/2021/11/calidad-home.jpg') no-repeat center/cover;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

.container{max-width:900px;margin:auto;padding:25px;}
.header{text-align:center;margin-bottom:20px;}
.header img{height:70px;}

.step{display:none;}
.active{display:block;}

.card{
  background:white;
  padding:30px;
  border-radius:12px;
  margin-bottom:20px;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid #ddd;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

.cantidad{
  display:flex;
  align-items:center;
  gap:8px;
}
.cantidad button{
  width:32px;height:32px;
  background:#f97316;color:white;border:none;border-radius:6px;
}
.cantidad input{
  width:55px;
  text-align:center;
}

.form-group{
  margin-bottom:18px;
}

label{
  font-weight:bold;
}

input{
  padding:12px;
  border-radius:6px;
  border:1px solid #ccc;
  width:100%;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
  font-weight:bold;
}

.btn{background:#f97316;color:white;}
.back{background:#ccc;}

.resumen{
  background:white;
  padding:25px;
  border-radius:10px;
  border-left:6px solid #f97316;
}

.total{
  font-size:22px;
  color:#f97316;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="https://petrocheck.com.ec/wp-content/uploads/2021/09/logo_oscuro.png">
</div>

<!-- PASO 1 -->
<div id="step1" class="step active">

<div class="card">
<h3>Servicio de inspección de autotanques</h3>

<p>
✔ Certificado de calibración líquida<br>
✔ Medición de espesores<br>
✔ Certificación NTE INEN 2266<br>
✔ Certificación NTE INEN 2251<br>
✔ Varilla de bronce graduada
</p>

<div id="lista"></div>
</div>

<div id="resumenPaso1" class="resumen"></div>

<button class="btn" onclick="validar()">Siguiente</button>

</div>

<!-- PASO 2 -->
<div id="step2" class="step">

<div class="card">
<h3>Datos del cliente</h3>

<div class="form-group">
<label>Razón Social *</label>
<input id="cliente">
</div>

<div class="form-group">
<label>RUC *</label>
<input id="ruc">
</div>

<div class="form-group">
<label>Correo *</label>
<input id="correo">
</div>

<div class="form-group">
<label>Teléfono *</label>
<input id="telefono">
</div>

<div class="form-group">
<label>Contacto *</label>
<input id="contacto">
</div>

</div>

<div id="resumenFinal" class="resumen"></div>

<button class="back" onclick="next(1)">Atrás</button>
<button class="btn" onclick="generarPDF()">📄 Generar PDF</button>
<button class="btn" onclick="enviarWhatsApp()">📲 Enviar WhatsApp</button>

</div>

</div>

<script>

/* RANGOS */
const rangos = [
["0-2000 galones",250],
["2001-4000 galones",280],
["4001-6000 galones",330],
["6001-8000 galones",350],
["8001-10000 galones",380],
["10001-12000 galones",410]
];

const lista=document.getElementById("lista");

rangos.forEach((r,i)=>{
lista.innerHTML+=`
<div class="item">
  <div>
    <b>${r[0]}</b><br>
    Precio: $${r[1]}
  </div>
  <div class="cantidad">
    <button onclick="cambiar(${i},-1)">-</button>
    <input id="cant${i}" value="0">
    <button onclick="cambiar(${i},1)">+</button>
  </div>
</div>`;
});

function cambiar(i,val){
let input=document.getElementById("cant"+i);
let v=parseInt(input.value)||0;
v+=val;
if(v<0)v=0;
input.value=v;
actualizar();
}

function obtenerDetalle(){
let total=0;
let detalle="";

rangos.forEach((r,i)=>{
let c=parseInt(document.getElementById("cant"+i).value)||0;
if(c>0){
let sub=c*r[1];
total+=sub;
detalle+=`${r[0]} x${c} = $${sub}\n`;
}
});

return {detalle,total};
}

function actualizar(){
let data=obtenerDetalle();

let html=`<h3>Resumen</h3><pre>${data.detalle || "No hay selección"}</pre>
<div class="total">TOTAL: $${data.total}</div>

<b style="color:red;">NOTA IMPORTANTE:</b>
<ul>
<li>El servicio se realizará en el patio de calibraciones de PETROCHECK, sector El Beaterio, Quito.</li>
<li>El cliente debe movilizar el autotanque.</li>
</ul>`;

document.getElementById("resumenPaso1").innerHTML=html;
document.getElementById("resumenFinal").innerHTML=html;
}

function validar(){
let data=obtenerDetalle();
if(data.total===0) return alert("Selecciona al menos un servicio");
next(2);
}

function validarDatos(){
if(!cliente.value || !ruc.value || !correo.value || !telefono.value || !contacto.value){
alert("Completa todos los datos");
return false;
}
return true;
}

/* PDF */
function generarPDF(){
if(!validarDatos()) return;

const {jsPDF}=window.jspdf;
let doc=new jsPDF();

let data=obtenerDetalle();

let texto=`
COTIZACIÓN PETROCHECK

Cliente: ${cliente.value}
RUC: ${ruc.value}
Correo: ${correo.value}
Teléfono: ${telefono.value}
Persona de Contacto: ${contacto.value}

DETALLE:
${data.detalle}

TOTAL: $${data.total}

NOTA:
El servicio se realizará en el patio de calibraciones de PETROCHECK (Quito).
El cliente debe movilizar el autotanque.
`;

doc.text(texto,10,10);
doc.save("cotizacion.pdf");
}

/* WHATSAPP */
function enviarWhatsApp(){
if(!validarDatos()) return;

let data=obtenerDetalle();

let txt=`
COTIZACIÓN PETROCHECK

Cliente: ${cliente.value}
RUC: ${ruc.value}
Correo: ${correo.value}
Teléfono: ${telefono.value}
Contacto: ${contacto.value}

DETALLE:
${data.detalle}

TOTAL: $${data.total}
`;

window.open("https://wa.me/593999300398?text="+encodeURIComponent(txt));
}

function next(n){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+n).classList.add("active");
}

</script>

</body>
</html>
